name: audit
on: [push, pull_request]
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: npm audit (high/critical) — informatif
        run: npm audit --audit-level=high
        continue-on-error: true
      - run: npm test
